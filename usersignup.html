<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signup Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow p-4">
          <h3 class="mb-4 text-center">Signup Form</h3>
          
          <form action="signup.php" method="POST">
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" class="form-control" id="email" name="email" placeholder="Enter email" required>
            </div>

            <div class="mb-3">
              <label for="password" class="form-label">Create Password</label>
              <input type="password" class="form-control" id="password" name="password" placeholder="Create password" required>
            </div>

            <div class="mb-3">
              <label for="city" class="form-label">City</label>
              <select class="form-select" id="city" name="city" required>
                <option selected disabled value="">Choose city</option>
                <option>Hyderabad</option>
                <option>Mumbai</option>
                <option>Delhi</option>
              </select>
            </div>

            <div class="mb-3">
              <label for="contact" class="form-label">Contact Number</label>
              <input type="tel" class="form-control" id="contact" name="contact" placeholder="Enter contact number" required pattern="[0-9]{10}">
            </div>

            <div class="d-grid">
              <button type="submit" class="btn btn-primary">Signup</button>
            </div>
          </form>

          <p class="text-center mt-3">
            Already have an account? 
            <a href="userlogin.html" style="text-decoration: none;">Login</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
