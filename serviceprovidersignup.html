<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Service Provider Signup</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow p-4">
          <h3 class="mb-4 text-center">Signup Form</h3>
          <form>
            <!-- Email -->
            <div class="mb-3">
              <label for="email" class="form-label">Email address</label>
              <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
            </div>

            <!-- Password -->
            <div class="mb-3">
              <label for="password" class="form-label">Create Password</label>
              <input type="password" class="form-control" id="password" placeholder="Create password" required>
            </div>

            <!-- City -->
            <div class="mb-3">
              <label for="city" class="form-label">City</label>
              <select class="form-select" id="city" required>
                <option selected disabled value="">Choose your city</option>
                <option>Hyderabad</option>
                <option>Delhi</option>
                <option>Mumbai</option>
              </select>
            </div>

            <!-- Service Provided -->
            <div class="mb-3">
              <label for="service" class="form-label">Service Provided</label>
              <select class="form-select" id="service" required>
                <option selected disabled value="">Select a service</option>
                <option>Carpentry</option>
                <option>Construction</option>
                <option>Electrician</option>
                <option>Gardening</option>
                <option>Painting</option>
                <option>Plumbing</option>
              </select>
            </div>

            <!-- Contact Number -->
            <div class="mb-3">
              <label for="contact" class="form-label">Contact Number</label>
              <input type="tel" class="form-control" id="contact" placeholder="Enter contact number" required pattern="[0-9]{10}">
            </div>

            <!-- Signup Button -->
            <div class="d-grid">
              <button type="submit" class="btn btn-success">Signup</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
