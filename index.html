    <style>
        *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        }
        body {
        background-color: #e3f2fd;
        font-family: 'Poppins', sans-serif;
        }
        #title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            color: white;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            flex-wrap: wrap;
            animation: fadeIn 1s ease-in-out;
            background-image: url(https://img.freepik.com/free-photo/vintage-grunge-blue-concrete-texture-studio-wall-background-with-vignette_1258-28374.jpg?t=st=1742910997~exp=1742914597~hmac=eeb38009b85f7b8f272170c862adb3d01c8b3d6f6ccb0aafe950c5089c493672&w=1380);
            animation: slideIn 1s ease-in-out;
        }
        #title-img {
            height: 80px;
            width: 80px;
            border-radius: 50%;
            border: 1px solid white;
            animation: slideIn 1.5s ease-in-out;
        }
        #search-bar {
            display: flex;
            flex-grow: 1;
            max-width: 400px;
            margin: 10px;
        }
        #search-bar input {
            border-radius: 25px;
            padding: 10px;
            flex-grow: 1;
            border: none;
        }
        #search-bar button {
            border-radius: 50%;
            background: white;
            border: none;
            padding: 8px 12px;
            margin-left: 5px;
        }
        #search-bar button i {
            color: #007aff;
        }
        .navbar{
            border-radius: 5px;
            margin-top: 5px;
            
            animation: slideIn 1.5s ease-in-out;
            position:relative;
            
            
        }
        .service-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            margin-top: 20px;
            animation: slideIn 2.25s ease-in-out;
        }
        .service{
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease-in-out, box-shadow 0.3s ease-in-out;
            text-align: center;

        }
        .service:hover {
        transform: scale(1.1); /* Zoom in effect */
        box-shadow: 0px 6px 20px rgba(0, 0, 0, 0.2); /* Slight shadow for depth */
        }
        .service img {
            width: 100%;
            height: auto;
            border-radius: 10px;
            object-fit: cover;
        }
        .service:hover img {
        transform: scale(1.05); /* Slight zoom on image */
        }

        footer {
            background: #1c1c1c;
            color: white;
            text-align: center;
            padding: 15px;
            width: 100%;
            margin-top: 20px;
            border-radius: 10px;
            padding-bottom: 0px;
            animation:slideIn 1s ease-in-out;
        }
        #footer a{
            text-decoration: none;
            color:dimgray;
        }
        #footer a:hover{
            color: blue;
            text-decoration: none;
        }
        h3 a{
            text-decoration: none;
        }
        @media (max-width: 768px) {
            #title {
                flex-direction: column;
                text-align: center;
            }
            #search-bar {
                width: 100%;
                max-width: none;
            }
            
        }
        
        
    </style>
